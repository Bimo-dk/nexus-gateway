# Docker's embedded DNS resolver — så nginx starter selvom upstreams ikke er klar endnu
resolver 127.0.0.11 valid=30s ipv6=off;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ----- Security headers -----
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ----- Public health -----
  location = /health {
    default_type application/json;
    return 200 '{"status":"ok","service":"app"}';
  }

  # ----- Reverse proxy: /api/* → registry:3000/api/* (uændret path) -----
  # ^~ giver højere prioritet end regex-locations (så remoteEntry.json regex ikke matcher først)
  location ^~ /api/ {
    set $upstream_api http://registry:3000;
    proxy_pass $upstream_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
  }

  # ----- WebSocket: /ws → registry:3000/ws (med upgrade headers) -----
  location ^~ /ws {
    set $upstream_ws http://registry:3000;
    proxy_pass $upstream_ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Hold WS-forbindelsen i live længe (24t) — connection state styres af klienten
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
  }

  # ----- Reverse proxy: /host/* → host:80/* (path-prefix strippet) -----
  location ^~ /host/ {
    set $upstream_host http://host:80;
    rewrite ^/host(/.*)$ $1 break;
    proxy_pass $upstream_host;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
  }

  # ----- Reverse proxy: /remotes/remoteOne/* → remote-one:80/* -----
  location ^~ /remotes/remoteOne/ {
    set $upstream_r1 http://remote-one:80;
    rewrite ^/remotes/remoteOne(/.*)$ $1 break;
    proxy_pass $upstream_r1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
  }

  # ----- Reverse proxy: /remotes/remoteTwo/* → remote-two:80/* -----
  location ^~ /remotes/remoteTwo/ {
    set $upstream_r2 http://remote-two:80;
    rewrite ^/remotes/remoteTwo(/.*)$ $1 break;
    proxy_pass $upstream_r2;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
  }

  # ----- App's egne statiske filer -----
  location ~* remoteEntry\.(json|js)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    try_files $uri =404;
  }

  location ~* /(chunk|remote)-[^/]+\.js$ {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ----- SPA fallback -----
  location / {
    try_files $uri $uri/ /index.html;
  }
}
